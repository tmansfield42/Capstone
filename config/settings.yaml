# ProbePoint Configuration

# Raspberry Pi identification
pi:
  id: "pi-001"                    # Unique identifier for this device this would be for if we had multiple devices in the future
  location: "test-lab"            # Deployment location 

# Client information
client:
  id: "client-test"               # Client identifier
  name: "Test Network"            # Client name for reports

# Scan parameters
scan:
  network_range:  # Network to scan leave empty to auto-detect 
  intensity: "T4"                 # Nmap timing (T1-T5, we recommend T4) real world use we would have to chaneg per client
  timeout: 300                    # Seconds per host scan leave empty for default
  interface:                # Network interface (eth0 or wlan0)  leave empty to auto-detect

# AWS server configuration
# not implemented yet 
aws:
  endpoint: "http://localhost:5000/api/upload"  # Change to AWS IP when ready
  api_key: "development-key-123"                # Change in production 
  retry_attempts: 3
  retry_delay: 10

# Storage paths (leave empty to use defaults relative to project root) 
# logging not done right now just using print statements but we can change this in the future to use a proper logging framework and then we would want to specify log file paths here
storage:
  results_dir: "scan_results"
  logs_dir: "logs"

# Hydra credential testing options
# set up with other wordlist options in future
hydra:
  wordlist: "testing"           # Use a file path in production (e.g. /usr/share/wordlists/common.txt)

# Scanning toggles (enable/disable specific scan types) 
features:
  credential_testing: true
  nikto_scanning: true          # Gates Nikto web vuln scanner only; deep port scan always runs
  tls_scanning: true